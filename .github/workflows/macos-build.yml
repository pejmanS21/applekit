name: macOS Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-15
            rust_target: aarch64-apple-darwin
            artifact: applekit-macos-arm64
          - name: macOS amd64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            artifact: applekit-macos-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchains
        run: |
          rustc --version
          cargo --version
          swift --version
          xcrun --sdk macosx --find swiftc

      - name: Add Rust target
        run: rustup target add "${{ matrix.rust_target }}"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --all-targets

      - name: Build Rust binary
        run: cargo build --release --target "${{ matrix.rust_target }}"

      - name: Build Swift helper
        run: ./scripts/build-swift-helper.sh

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp "target/${{ matrix.rust_target }}/release/applekit" "dist/applekit"
          cp "target/helper/ReminderHelper" "dist/ReminderHelper"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
